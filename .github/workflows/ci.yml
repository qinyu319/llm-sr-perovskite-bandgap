name: Reproducibility checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deterministic test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            numpy==2.2.6 \
            pandas==2.3.3 \
            scipy==1.16.1 \
            scikit-learn==1.8.0 \
            statsmodels==0.14.5 \
            matplotlib==3.10.6 \
            seaborn==0.13.2 \
            openpyxl==3.1.5 \
            PyYAML==6.0.3 \
            pytest==8.4.2

      - name: Verify immutable files
        run: python scripts/verify_checksums.py

      - name: Scan for secrets and private paths
        run: python scripts/security_scan.py

      - name: Smoke-test Final M4 reproduction
        run: python scripts/reproduce_main_results.py --bootstrap-samples 100

      - name: Run group-aware tests
        working-directory: group_aware_sensitivity
        run: python -m pytest tests
